  <!-- AI scan lines -->
  <line x1="88" y1="108" x2="168" y2="108" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
  <line x1="92" y1="128" x2="164" y2="128" stroke="#4fc3f7" stroke-width="2.5" opacity="0.8"/>
  <line x1="96" y1="148" x2="160" y2="148" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
  <!-- Check mark -->
  <path d="M108 128 L122 142 L148 110" fill="none" stroke="#4fc3f7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow dot -->
  <circle cx="128" cy="72" r="4" fill="#4fc3f7" opacity="0.9"/>
